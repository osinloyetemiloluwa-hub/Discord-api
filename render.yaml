
# Render Blueprint - Discord Logger Bot
# Deploy both bot and API as separate services

services:
  # Discord Bot Worker (Background process, no open ports)
  - type: web
    name: discord-bot
    env: python
    region: oregon
    plan: starter  # Note: Background workers require at least a starter plan on Render
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString

  # Flask API (Web service, handles incoming HTTP traffic)
  - type: web
    name: discord-api
    env: python
    region: oregon
    plan: free     # Web services are allowed on the free tier
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"

databases:
  - name: discord-logs-db
    plan: free
    databaseName: discord_logs
