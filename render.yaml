# Render Blueprint - Discord Logger Bot
# Combined Multi-Process Architecture for Free Tier

services:
  - type: web
    name: discord-logger-service
    env: python
    region: oregon
    plan: free     # 100% Free Tier Web Service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"

databases:
  - name: discord-logs-db
    plan: free     # 100% Free Tier PostgreSQL
    databaseName: discord_logs
